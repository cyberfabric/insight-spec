version: 2

sources:
  - name: bronze_m365
    schema: bronze_m365
    tables:
      - name: email_activity
      - name: teams_activity

models:
  - name: m365__comms_events
    description: "M365 communication events → staging, feeds class_comms_events"
    columns:
      - name: insight_tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: insight_source_type
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: user_email
        description: "User principal name from M365"
      - name: activity_date
        tests:
          - not_null
